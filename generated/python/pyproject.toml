[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "order-manager-contracts"
version = "0.0.0"
description = "Generated Pydantic models and helpers for Order Manager (bootstrap until datamodel-codegen is wired)"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "pydantic>=2.10,<3",
]

[project.optional-dependencies]
dev = [
  "datamodel-code-generator>=0.30",
  "mypy>=1.14",
  "ruff>=0.9",
]

[tool.hatch.build.targets.wheel]
packages = ["order_manager_contracts"]

[tool.ruff]
target-version = "py313"
src = ["order_manager_contracts"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"order_manager_contracts/generated/**" = ["E501"]

[tool.mypy]
python_version = "3.13"
strict = true
packages = ["order_manager_contracts"]
