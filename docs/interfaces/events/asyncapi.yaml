asyncapi: 3.1.0
info:
  title: Order Manager platform events
  version: 0.2.0
  description: >
    NATS JetStream catalog for the Order Manager platform.
    Per-service channel definitions are in separate files and bundled
    into final-asyncapi.yaml via @asyncapi/cli.
  contact:
    name: Guilherme Rauen
    url: https://github.com/guilherme-rauen/order-manager-contracts
    email: contracts@ordermanager.dev
  license:
    name: UNLICENSED
    url: https://github.com/guilherme-rauen/order-manager-contracts/blob/main/LICENSE
  tags:
    - name: orders
      description: Order aggregate lifecycle
    - name: payments
      description: Payment processing
    - name: shipments
      description: Shipment tracking
    - name: sagas
      description: Saga orchestration

defaultContentType: application/json

servers:
  development:
    host: nats://localhost:4222
    protocol: nats
    description: Local NATS (JetStream enabled)

channels:
  # --- Order domain ---
  orderDomainEvents:
    $ref: './asyncapi_order.yaml#/channels/orderDomainEvents'
  orderCommands:
    $ref: './asyncapi_order.yaml#/channels/orderCommands'

  # --- Payment domain ---
  paymentDomainEvents:
    $ref: './asyncapi_payment.yaml#/channels/paymentDomainEvents'
  paymentCommands:
    $ref: './asyncapi_payment.yaml#/channels/paymentCommands'

  # --- Shipment domain ---
  shipmentDomainEvents:
    $ref: './asyncapi_shipment.yaml#/channels/shipmentDomainEvents'
  shipmentCommands:
    $ref: './asyncapi_shipment.yaml#/channels/shipmentCommands'

  # --- Dead letter ---
  deadLetter:
    address: dlq.>
    description: Dead letter queue for failed event processing
