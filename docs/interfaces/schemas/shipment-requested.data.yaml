$schema: https://json-schema.org/draft/2020-12/schema
$id: ShipmentRequestedData
description: Payload for com.ordermanager.shipment.requested.v1
type: object
additionalProperties: false
properties:
  shipment_id:
    $ref: ./primitives/shipment-id.yaml
  order_id:
    $ref: ./primitives/order-id.yaml
  customer_id:
    $ref: ./primitives/customer-id.yaml
  delivery_address:
    type: object
    title: DeliveryAddress
    additionalProperties: false
    properties:
      street:
        type: string
      city:
        type: string
      postal_code:
        type: string
      country:
        type: string
        pattern: ^[A-Z]{2}$
        description: ISO 3166-1 alpha-2 country code
    required:
      - street
      - city
      - postal_code
      - country
  items:
    type: array
    minItems: 1
    items:
      type: object
      title: ShipmentItem
      additionalProperties: false
      properties:
        product_id:
          type: string
        quantity:
          type: integer
          minimum: 1
      required:
        - product_id
        - quantity
required:
  - shipment_id
  - order_id
  - customer_id
  - delivery_address
  - items
